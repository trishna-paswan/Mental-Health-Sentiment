<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moods3D - Immersive Analysis</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary-glow: rgba(79, 70, 229, 0.4);
    --secondary-glow: rgba(192, 38, 211, 0.4);
  }

  body {
    background: radial-gradient(circle at center, #1a1c2c 0%, #0b0f1a 100%);
    font-family: 'Inter', sans-serif;
    margin: 0;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .glass {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  .option-card {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .option-card:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
    border-color: rgba(99, 102, 241, 0.5);
  }

  .option-card.selected {
    background: rgba(99, 102, 241, 0.2);
    border-color: #6366f1;
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
  }

  .emoji-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .float-3d {
    position: absolute;
    opacity: 0.6;
    animation: float-complex var(--duration) ease-in-out infinite;
  }

  @keyframes float-complex {
    0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
    33% { transform: translate3d(20px, -40px, 50px) rotate(10deg); }
    66% { transform: translate3d(-15px, -20px, -30px) rotate(-10deg); }
  }

  .glow {
    position: absolute;
    width: 40vw;
    height: 40vw;
    filter: blur(100px);
    border-radius: 50%;
    z-index: -1;
  }
  .glow-1 { top: -10%; left: -10%; background: var(--primary-glow); }
  .glow-2 { bottom: -10%; right: -10%; background: var(--secondary-glow); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
</style>
</head>

<body class="flex items-center justify-center p-4 md:p-12">

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="emoji-container" id="emojiField"></div>

  <main class="glass rounded-[3rem] w-full max-w-4xl p-8 md:p-16 relative z-10">
    <div class="flex justify-between items-start mb-8">
      <div class="w-10"></div>
      <header class="text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-4">
          Moods<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">3D</span>
        </h1>
        <p class="text-gray-400 text-lg">Understand your emotions with AI</p>
      </header>
      <a href="/" class="glass px-4 py-2 rounded-xl text-sm font-bold hover:bg-white/10 transition-colors">Reset 🔄</a>
    </div>

    <form action="/" method="POST" id="analysisForm">
      
      <!-- Step 1: Main Text Input -->
      <section class="mb-12">
        <label class="block text-2xl md:text-3xl font-bold mb-6 text-center">How are you feeling right now?</label>
        <textarea name="text" rows="5" required
          class="w-full bg-white/5 border border-white/10 rounded-3xl px-8 py-6 text-white text-xl placeholder-gray-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 resize-none"
          placeholder="Write freely...">{{ user_text }}</textarea>
      </section>

      <!-- Step 2: Cause Selection -->
      <section class="mb-12">
        <label class="block text-xl font-semibold mb-6 text-center">What might be the reason?</label>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
          <div class="option-card p-4 rounded-2xl text-center cause-btn" data-value="Studies">📚<div class="text-sm font-bold">Studies</div></div>
          <div class="option-card p-4 rounded-2xl text-center cause-btn" data-value="Work">💼<div class="text-sm font-bold">Work</div></div>
          <div class="option-card p-4 rounded-2xl text-center cause-btn" data-value="Relationships">💔<div class="text-sm font-bold">Relationships</div></div>
          <div class="option-card p-4 rounded-2xl text-center cause-btn" data-value="Health">🏥<div class="text-sm font-bold">Health</div></div>
          <div class="option-card p-4 rounded-2xl text-center cause-btn" data-value="Not sure">🤷<div class="text-sm font-bold">Not sure</div></div>
        </div>
        <input type="hidden" name="cause" id="causeInput">
      </section>

      <!-- Step 3: Detailed Reason ONLY -->
      <section class="mb-12">
        <label class="block text-xl font-semibold mb-4 text-center">Explain more about your feelings 💭</label>
        <textarea name="detailed_reason" rows="5"
          class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/30 resize-none"
          placeholder="Describe what’s going on in more detail..."></textarea>
      </section>

      <!-- Submit -->
      <button type="submit" 
        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black py-6 rounded-[2rem] hover:shadow-indigo-500/40 transform hover:-translate-y-1 transition-all text-2xl">
        Analyze / Get Support 🚀
      </button>
    </form>

  </main>

  <script>
    const emojis = ['😊','😎','🔥','🚀','🌈','🥳','💎','✨','🥺','😂','😍','🤯','⚡','😇','🤩','🌟','🍀','🦋'];
    const field = document.getElementById('emojiField');
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'float-3d';
      el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.cssText = `font-size:${Math.random()*40+20}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*-15}s;--duration:${Math.random()*10+10}s;`;
      field.appendChild(el);
    }

    const buttons = document.querySelectorAll('.cause-btn');
    const input = document.getElementById('causeInput');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        input.value = btn.dataset.value;
      });
    });
  </script>
</body>
</html>
